services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-inspectra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-inspectra123}
      POSTGRES_DB: ${POSTGRES_DB:-inspectra}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build: ./backend
    environment:
      INSPECTRA_SECRET_KEY: ${INSPECTRA_SECRET_KEY:-change-this-before-production}
      INSPECTRA_CORS_ORIGINS: http://localhost:3000
      POSTGRES_USER: ${POSTGRES_USER:-inspectra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-inspectra123}
      POSTGRES_DB: ${POSTGRES_DB:-inspectra}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    depends_on:
      - db
    ports:
      - "8000:8000"

  web:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000/api
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  postgres-data:
